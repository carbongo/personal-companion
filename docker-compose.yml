# personal-companion — Docker Compose.
#
# Default: runs just the companion, expecting an Ollama you already have
# (set LLM_OLLAMA_URL in .env, e.g. http://host.docker.internal:11434).
#
# Fully-local stack: uncomment the `ollama` service below to run the model
# alongside the app, and set LLM_OLLAMA_URL=http://ollama:11434 in .env.

services:
  companion:
    build: .
    image: personal-companion:latest
    env_file: .env
    ports:
      - "${PORT:-8080}:8080"
    volumes:
      - ./data:/data
    restart: unless-stopped
